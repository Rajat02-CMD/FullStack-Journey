<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip Card</title>
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f2f2f2;
}

.container{
    width:200px;
    height:200px;
    perspective:1000px;
}

.card{
    width:100%;
    height:100%;
    position:relative;
    transition:0.6s;
    transform-style:preserve-3d;
}
.container:hover .card{
    transform:rotateY(180deg);
}
.front,
.back{
    width:100%;
    height:100%;
    position:absolute;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    color:white;
    border-radius:10px;
    backface-visibility:hidden;
}
.front{
    background:red;
}

.back{
    background:blue;
    transform:rotateY(180deg);
}
    </style>
</head>
<body>

    <div class="container">

        <div class="card">

            <div class="front">
                <h2>Front</h2>
            </div>

            <div class="back">
                <h2>Back</h2>
            </div>

        </div>

    </div>

</body>
</html>
