<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css relative</title>
</head>
<style>
    .main {width:1000px;height:600px;border:4px solid black;display: flex;
    position: relative;}
    .star {width: 200px;height: 200px; border:2px solid brown;}
    .star:nth-child(1) { right:0px ; top : 0px;position: absolute; }
    .star:nth-child(2) { left: 0px;top:0px;position: absolute;}
    .star:nth-child(3) {top: 400px; right: 800px;position: absolute;}
    .star:nth-child(4) {top:400px;left: 800px;position:absolute;}
</style>
<body>
    <div class="main">
        <div class="star">A</div>
        <div class="star">B</div>
        <div class="star">C</div>
        <div class="star">D</div>
       
    </div>
</body>
</html>
