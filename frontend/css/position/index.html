<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .parent {width: 700px;
    height:500px;
    border: 2px solid black;
display: flex;
position: relative;

}
.parent:hover .child:nth-child(1)
{
   
left: 600px;
}
.parent:hover .child:nth-child(2)
{
    top: 400px;

}
.parent:hover .child:nth-child(3)
{
   right: 600px;

}
.parent:hover .child:nth-child(4)
{
    bottom: 400px;
    

}
.child {height: 100px;
    width: 100px;
    border: 2px solid red;


}

.child:nth-child(1) {
        position: absolute;
    top: 0px;
    left: 0px;
    background-color: rgb(166, 255, 0);
    transition: 4s;
    }
    .child:nth-child(2) {
        position: absolute;
    top: 0px;
    right: 0px;
    background-color: blue;
    transition: 4s;
    }

    .child:nth-child(3) {
        position: absolute;
    bottom: 0px;
    right:0px;
    background-color: beige;
    transition: 4s;

    }
    .child:nth-child(4) {
        position: absolute;
    bottom: 0px;
    left: 0px;
    transition: 4s;
    background-color: brown;
    transition: 4s;

    }

</style>
<body>
    <div class="parent">
        <div class="child">1</div>
        <div class="child">2</div>
        <div class="child">3</div>
        <div class="child">4</div>
    </div>
</body>
</html>
