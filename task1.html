<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid basic</title>
</head>
<style>
    .parent {width: 1500px;
    height: 600px;border: 2px solid black;
display: grid;
grid: repeat(auto,150px) / repeat(auto,250px);}
.child {border:2px solid rgb(46, 167, 100);}
.child{ padding:20px;  box-sizing:border-box;}
.child:nth-child(1) {grid-row:1 / span 2 ;font-size: 25px;
background-image:url('images/images.jpg');background-size:cover}
.child:nth-child(1) h2{ margin-left:50px;  font-size:40px;}
.child:nth-child(1) p{  margin-left:50px; font-size:20px;}
.child:nth-child(2) {grid-column:2 / span 3;grid-column:start 2;}
/* .child:nth-child(3) {grid-column: ;}  */
.child:nth-child(6) {grid-row: 1 /span 2;}

</style>
<body>
    <div class="parent">
        <div class="child"><h2>HTML</h2> <p> tags, attributes</p></div>
        <div class="child"><h2>CSS</h2></div>
        <div class="child"><h2>React</h2></div>                      
        <div class="child"><h2>tags</h2></div>
        <div class="child"><h2>types of css</h2></div>
        <div class="child"><h2>styles</h2> </div>
    </div>
</body>
</html>
