<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
    }

    .main {
        height: 600px;
        width: 800px;
        border: 4px solid rgb(9, 3, 95)
    }

    .box {
        height: 200px;
        width: 200px;
        color: yellow;
        background-color: rgb(3, 95, 35);
        font-size: 24px;
        margin: auto;
        float: left;
        box-sizing: border-box
        ;
    }
</style>

<body>

    <div class="main" >
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div>
    </div>

</body>
</html>
